version: '3.8'

services:
  bridge:
    build: .
    container_name: xiaozhi-bridge
    restart: unless-stopped
    ports:
      - "${OPENAI_API_PORT:-8000}:8000"
      - "${WEB_UI_PORT:-8080}:8080"
    environment:
      - XIAOZHI_OTA_URL=${XIAOZHI_OTA_URL:-https://api.tenclass.net/xiaozhi/ota/}
      - BRIDGE_HOST=${BRIDGE_HOST:-0.0.0.0}
      - OPENAI_API_PORT=${OPENAI_API_PORT:-8000}
      - WEB_UI_PORT=${WEB_UI_PORT:-8080}
      - DEVICE_MAC=${DEVICE_MAC:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PROTOCOL=${PROTOCOL:-websocket}
    volumes:
      - ./data:/data
    networks:
      - xiaozhi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Redis for session management (can be removed if not needed)
  redis:
    image: redis:7-alpine
    container_name: xiaozhi-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - xiaozhi-network
    profiles:
      - with-redis

  # Optional: Nginx reverse proxy for production (can be removed if not needed)
  nginx:
    image: nginx:alpine
    container_name: xiaozhi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - bridge
    networks:
      - xiaozhi-network
    profiles:
      - production

networks:
  xiaozhi-network:
    driver: bridge

volumes:
  redis-data:
